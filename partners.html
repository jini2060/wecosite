<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partners | WE Corporation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f7f7f3;
      color: #111;
    }

    .nav {
      width: 100%;
      padding: 32px 42px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      width: 110px;
    }

    .hamburger {
      width: 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
    }

    .hamburger span {
      height: 3px;
      background: #111;
      display: block;
    }

    .nav-links {
      display: none;
      position: absolute;
      top: 85px;
      right: 40px;
      background: #111;
      padding: 26px 34px;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
    }

    .nav-links.active {
      display: flex;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .partners-section {
      max-width: 1180px;
      margin: 40px auto 100px;
      padding: 0 24px;
      text-align: center;
    }

    .section-label {
      font-size: 13px;
      letter-spacing: 6px;
      color: #888;
      margin-bottom: 22px;
    }

    .partner-slide {
      display: none;
    }

    .partner-slide.active {
      display: block;
    }

    .partner-slide h1 {
      font-size: 48px;
      letter-spacing: 10px;
      margin-bottom: 42px;
      font-weight: 800;
    }

    .product-stage {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 50px 60px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.06);
    }

    .main-product {
      width: 100%;
      max-height: 430px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    .product-thumbs {
      max-width: 860px;
      margin: 22px auto 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .product-thumbs img {
      width: 100%;
      height: 120px;
      object-fit: contain;
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      opacity: 0.75;
      transition: 0.3s;
    }

    .product-thumbs img:hover,
    .product-thumbs img.active-thumb {
      opacity: 1;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .partner-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      font-size: 56px;
      cursor: pointer;
      color: #111;
      z-index: 5;
    }

    .partner-arrow.prev {
      left: 9%;
    }

    .partner-arrow.next {
      right: 9%;
    }

    .partner-dots {
      margin-top: 28px;
    }

    .dot {
      width: 8px;
      height: 8px;
      display: inline-block;
      background: #ccc;
      border-radius: 50%;
      margin: 0 7px;
      cursor: pointer;
    }

    .dot.active {
      background: #111;
    }

    .footer {
      max-width: 1180px;
      margin: 0 auto;
      padding: 55px 90px;
      background: #f7f7f3;
      display: flex;
      align-items: flex-start;
      gap: 80px;
      border-top: 1px solid #ddd;
    }

    .footer-logo img {
      width: 190px;
    }

    .footer-info h3 {
      font-size: 18px;
      margin-bottom: 12px;
    }

    .footer-info p {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
    }

    .footer-info span {
      display: block;
      margin-top: 18px;
      font-size: 12px;
      color: #999;
    }

    @media (max-width: 768px) {
      .partner-slide h1 {
        font-size: 34px;
        letter-spacing: 5px;
      }

      .product-stage {
        padding: 28px 24px;
      }

      .product-thumbs {
        grid-template-columns: repeat(2, 1fr);
      }

      .partner-arrow {
        font-size: 38px;
      }

      .partner-arrow.prev {
        left: 20px;
      }

      .partner-arrow.next {
        right: 20px;
      }

      .footer {
        padding: 45px 24px;
        flex-direction: column;
        gap: 30px;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="nav">
      <div class="logo">
        <a href="index.html">
          <img src="CI(navy).png" alt="WE Corporation Logo">
        </a>
      </div>

      <div class="nav-links">
        <a href="about.html">About us</a>
        <a href="services.html">Services</a>
        <a href="partners.html">Partners</a>
        <a href="index.html#contact">Contact</a>
      </div>

      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
  </header>

  <main>
    <section class="partners-section">
      <p class="section-label">OUR PARTNERS</p>

      <div class="partner-slide active">
        <h1>ICEBERG</h1>
        <div class="product-stage">
          <img class="main-product" src="iceberg1.jpg" alt="ICEBERG product">
        </div>
        <div class="product-thumbs">
          <img class="active-thumb" src="iceberg1.jpg" onclick="changeProduct(this)">
          <img src="iceberg2.jpg" onclick="changeProduct(this)">
          <img src="iceberg3.jpg" onclick="changeProduct(this)">
          <img src="iceberg4.jpg" onclick="changeProduct(this)">
        </div>
      </div>

      <div class="partner-slide">
        <h1>K2 SAFETY</h1>
        <div class="product-stage">
          <img class="main-product" src="k2-1.png" alt="K2 Safety product">
        </div>
        <div class="product-thumbs">
          <img class="active-thumb" src="k2-1.png" onclick="changeProduct(this)">
          <img src="k2-2.png" onclick="changeProduct(this)">
          <img src="k2-3.png" onclick="changeProduct(this)">
          <img src="k2-4.png" onclick="changeProduct(this)">
        </div>
      </div>

      <div class="partner-slide">
        <h1>AMAZINGCRE</h1>
        <div class="product-stage">
          <img class="main-product" src="amazingcre1.png" alt="AMAZINGCRE product">
        </div>
        <div class="product-thumbs">
          <img class="active-thumb" src="amazingcre1.png" onclick="changeProduct(this)">
          <img src="amazingcre2.png" onclick="changeProduct(this)">
          <img src="amazingcre3.png" onclick="changeProduct(this)">
          <img src="amazingcre4.png" onclick="changeProduct(this)">
        </div>
      </div>

      <button class="partner-arrow prev" onclick="movePartner(-1)">&#10094;</button>
      <button class="partner-arrow next" onclick="movePartner(1)">&#10095;</button>

      <div class="partner-dots">
        <span class="dot active" onclick="showPartner(0)"></span>
        <span class="dot" onclick="showPartner(1)"></span>
        <span class="dot" onclick="showPartner(2)"></span>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-logo">
      <img src="CI(navy).png" alt="WE Corporation Logo">
    </div>

    <div class="footer-info">
      <h3>WE. CORPORATION</h3>
      <p>
        CEO: Young-Hwan WI &nbsp;&nbsp; License: 876-81-02011<br>
        Code square 401-ho, 53, Yutongdanji 1-ro, Gangseo-gu 46721 Republic of Korea
      </p>
      <span>©2026 WE. Corporation. ALL RIGHTS RESERVED.</span>
    </div>
  </footer>

  <script>
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelector('.nav-links');

    hamburger.addEventListener('click', function () {
      navLinks.classList.toggle('active');
    });

    let partnerIndex = 0;
    const slides = document.querySelectorAll('.partner-slide');
    const dots = document.querySelectorAll('.dot');

    function showPartner(index) {
      slides[partnerIndex].classList.remove('active');
      dots[partnerIndex].classList.remove('active');

      partnerIndex = index;

      slides[partnerIndex].classList.add('active');
      dots[partnerIndex].classList.add('active');
    }

    function movePartner(direction) {
      let nextIndex = partnerIndex + direction;

      if (nextIndex < 0) nextIndex = slides.length - 1;
      if (nextIndex >= slides.length) nextIndex = 0;

      showPartner(nextIndex);
    }

    function changeProduct(thumb) {
      const slide = thumb.closest('.partner-slide');
      const mainImage = slide.querySelector('.main-product');
      const thumbs = slide.querySelectorAll('.product-thumbs img');

      mainImage.src = thumb.src;

      thumbs.forEach(img => img.classList.remove('active-thumb'));
      thumb.classList.add('active-thumb');
    }
  </script>
</body>
</html>
